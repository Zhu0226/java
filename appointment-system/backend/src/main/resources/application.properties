# ==========================================
# ??????
# ==========================================
# ????
spring.application.name=hospital-backend
# ????
server.port=8080

# Optional local overrides (DO NOT commit real credentials)
spring.config.import=optional:application-local.properties

# ==========================================
# ???????? (HikariCP ????)
# ==========================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/hospital_appointment_pro?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# MyBatis ??
# ==========================================
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==========================================
# Redis & Redisson ??????
# ==========================================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=100
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5

# ==========================================
# RabbitMQ ??????
# ==========================================
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3

# ==========================================
# Actuator & Prometheus ??????
# ==========================================
management.endpoints.web.exposure.include=*
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.enable.all=true
spring.datasource.hikari.pool-name=HospitalHikariPool
spring.datasource.type=com.zaxxer.hikari.HikariDataSource